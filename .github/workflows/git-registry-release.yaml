name: Release to github

on: workflow_dispatch

jobs:
    release:
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: 'https://npm.pkg.github.com'

            - uses: pnpm/action-setup@v3
              name: Install pnpm
              id: pnpm-install
              with:
                  version: '9'
                  run_install: false

            - name: Get pnpm store directory
              id: pnpm-cache
              shell: bash
              run: |
                  echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - uses: actions/cache@v4
              name: Setup pnpm cache
              with:
                  path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Build
              run: |
                  pnpm build

            - name: Pack
              shell: bash
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  npm run pack

            - name: Run @arethetypeswrong/cli
              run: |
                  pnpm attw package.tgz

            - name: Remove temp npmrc
              run: rm -f "$NPM_CONFIG_USERCONFIG"

            - name: Update NPM
              run: npm install -g npm@latest

            - name: Publish
              shell: bash
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  version="$(jq -r .version package.json)"

                  echo "Publishing brocli@$version"
                  npm publish package.tgz --access public

                  echo "npm: \`+ brocli@$version\`" >> $GITHUB_STEP_SUMMARY
